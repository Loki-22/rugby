<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Blacks &amp; Springboks — 2026 Fixtures (NZ Time)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>All Blacks &amp; Springboks</h1>
    <p class="subtitle">2026 · Rugby Championship & November Tests · All kick-off times shown in <strong>Local Time</strong></p>
    <p class="nz-clock" id="nzClock">Loading time&hellip;</p>
  </header>

  <nav class="filters" aria-label="Team filter">
    <button class="filter-btn active" data-team="all">All Games</button>
    <button class="filter-btn" data-team="New Zealand">All Blacks</button>
    <button class="filter-btn" data-team="South Africa">Springboks</button>
  </nav>

  <div class="search-bar">
    <button id="updateBtn" class="search-btn">🔄 Update Scores</button>
  </div>

  <main>
    <section id="gamesContainer" class="games-grid" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <p>Times auto-convert to the <strong>Pacific/Auckland</strong> timezone. Scores update automatically every 5 minutes or when you click the Update Scores button.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
